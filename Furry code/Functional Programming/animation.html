<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stuffed Person & Dog Animation</title>
    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 2px solid black;
            background: #fff8dc;
        }
    </style>
</head>

<body>
    <canvas id="game" width="600" height="300"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // Character data
        let person = { x: 150, y: 200, radius: 30, belly: 0 };
        let dog = { x: 450, y: 200, radius: 20, belly: 0 };

        // Food array
        let food = [];
        for (let i = 0; i < 10; i++) {
            food.push({
                x: Math.random() * 400 + 100,
                y: -Math.random() * 200,
                size: 10 + Math.random() * 10,
                speed: 1 + Math.random() * 2
            });
        }

        // Draw characters
        function drawPerson() {
            ctx.beginPath();
            ctx.arc(person.x, person.y, person.radius + person.belly, 0, Math.PI * 2); // belly grows
            ctx.fillStyle = "orange";
            ctx.fill();

            // head
            ctx.beginPath();
            ctx.arc(person.x, person.y - 40, 20, 0, Math.PI * 2);
            ctx.fillStyle = "peachpuff";
            ctx.fill();
        }

        function drawDog() {
            ctx.beginPath();
            ctx.arc(dog.x, dog.y, dog.radius + dog.belly, 0, Math.PI * 2); // belly grows
            ctx.fillStyle = "brown";
            ctx.fill();

            // head
            ctx.beginPath();
            ctx.arc(dog.x, dog.y - 25, 15, 0, Math.PI * 2);
            ctx.fillStyle = "saddlebrown";
            ctx.fill();
        }

        // Draw food
        function drawFood() {
            food.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fillStyle = "red";
                ctx.fill();
            });
        }

        // Update food
        function updateFood() {
            food.forEach(f => {
                f.y += f.speed;

                // Check if it reaches person or dog
                if (Math.hypot(f.x - person.x, f.y - person.y) < person.radius + person.belly) {
                    person.belly += 2; // grow belly
                    f.y = -20; // reset food
                    f.x = Math.random() * 400 + 100;
                }
                if (Math.hypot(f.x - dog.x, f.y - dog.y) < dog.radius + dog.belly) {
                    dog.belly += 1.5; // grow belly slower
                    f.y = -20;
                    f.x = Math.random() * 400 + 100;
                }

                // Reset if it falls off screen
                if (f.y > canvas.height + 20) {
                    f.y = -20;
                    f.x = Math.random() * 400 + 100;
                }
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateFood();
            drawPerson();
            drawDog();
            drawFood();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
