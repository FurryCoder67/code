<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Trajectory</title>
</head>

<body>
    <script>
        function assertArray(arr, wantedArr, debug) {
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] != wantedArr[i]) {
                    console.error(debug);
                    return debug;
                }
            }
        }
    </script>
</body>
