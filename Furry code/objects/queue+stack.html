<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue and Stack</title>
</head>

<body>
    <script>
        class Queue {
            constructor() {
                this.arr = [];
            }
            enqueue(element) {
                this.arr.push(element);
                return this.arr;
            }
            dequeue() {
                if (!this.arr.isEmpty()) return this.arr.shift();
                return 'make sumtin first not sigma boy';
            }
            peek() {
                if (!this.arr.isEmpty()) return this.arr[0];
                return 'make sumtin first not sigma boy';
            }
            isEmpty() {
                return this.arr.length == 0;
            }
            size() {
                return this.arr.length;
            }
            run() {
                let myQueue = new Queue();
                console.assert(myQueue.isEmpty() == true, `Test 1 failed`);
                console.assert(myQueue.size() == 0, `Test 2 failed`);
                console.assert(myQueue.peek() == 'make sumtin first not sigma boy', `Test 3 failed`);
                console.assert(myQueue.enqueue('676767') == ['676767'], `Test 3 failed`);
                console.assert(myQueue.peek() == 'make sumtin first not sigma boy', `Test 3 failed`);
            }
        }
    </script>
</body>

</html>
