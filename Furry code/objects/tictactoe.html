<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        .board {
            width: 300px;
            height: 300px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            background: #222;
            padding: 5px;
        }

        .cell {
            background: #fff;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .button {
            background-color: chartreuse;
            padding: auto;
            font: oblique;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>


    <script>
        class TicTacToe {
            constructor() {
                this.grid = [];
                for (let i = 0; i < 3; i++) {
                    this.grid[i] = [];
                    for (let j = 0; j < 3; j++) {
                        this.grid[i][j] = '';
                    }
                }
            }

            get(x, y) {
                return this.grid[x][y];
            }

            set(x, y, value) {
                this.grid[x][y] = value;
            }
            isGameWon() {
                for (let i = 0; i < 3; i++) {
                    if (this.grid[i][0] && this.grid[i][0] == this.grid[i][1] && this.grid[i][1] == this.grid[i][2]) {
                        return true;
                    }
                }
                for (let i = 0; i < 3; i++) {
                    if (this.grid[0][i] && this.grid[0][i] == this.grid[1][i] && this.grid[1][i] == this.grid[2][i]) {
                        return true;
                    }
                }
                if (this.grid[0][0] && this.grid[0][0] == this.grid[1][1] && this.grid[1][1] == this.grid[2][2]) {
                    return true;
                }
                if (this.grid[0][2] && this.grid[0][2] == this.grid[1][1] && this.grid[1][1] == this.grid[2][0]) {
                    return true;
                }
                return false;
            }
        }

        let currentPlayer = 'X';
        let game = new TicTacToe();
        let gameOver = false;

        let cells = document.getElementsByClassName('cell');
        let newGameButton = document.getElementById('newGame');

        function updateBoard() {
            for (let i = 0; i < cells.length; i++) {
                let x = Math.floor(i / 3);
                let y = i % 3;
                cells[i].textContent = game.get(x, y);
            }
        }

        for (let i = 0; i < cells.length; i++) {
            cells[i].onclick = function () {
                if (gameOver) return;

                let x = Math.floor(i / 3);
                let y = i % 3;

                if (!game.get(x, y)) {
                    game.set(x, y, currentPlayer);
                    updateBoard();

                    if (game.isGameWon()) {
                        alert('Game Over');
                        gameOver = true;
                    } else {
                        if (currentPlayer === 'X') {
                            currentPlayer = 'O';
                        } else {
                            currentPlayer = 'X';
                        }
                    }
                }
            };
        }
        function newGame() {
            game = new TicTacToe();
            currentPlayer = 'X';
            gameOver = false;
            updateBoard();
        }
        updateBoard();
    </script>
    <button onclick="newGame()" class="button">New Game</button>
</body>

</html>
