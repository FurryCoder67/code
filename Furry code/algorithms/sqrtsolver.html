        function breakPieces(numStr) {
            let result = [];
            let parts = [];
            let current = "";

            for (let i = 0; i < numStr.length; i++) {
                if (numStr[i] === ".") {
                    parts.push(current);
                    current = "";
                } else {
                    current += numStr[i];
                }
            }
            parts.push(current);
            if (parts.length == 1) parts.push("");

            let wholenum = parts[0];
            let decimal = parts[1];
            if (wholenum == "") wholenum = "0";

            if (wholenum.length % 2 !== 0) {
                result.push(Number(wholenum[0]));
                wholenum = wholenum.slice(1);
            }

            for (let i = 0; i < wholenum.length; i += 2) {
                if (wholenum.slice(i, i + 2)) {
                    result.push(Number(wholenum.slice(i, i + 2)));
                }
            }

            if (decimal.length > 0) {
                while (decimal.length % 2 !== 0) {
                    decimal += "0";
                }
                for (let i = 0; i < decimal.length; i += 2) {
                    result.push(Number(decimal.slice(i, i + 2)));
                }
            }

            return result;
        }

        function findClosestSqrt(str) {
            for (let i = 0; i <= 10; i++) {
                if (i * i > Number(str)) return String(i - 1);
            }
            return "9";
        }

        function findNextNumber(doubledRoot, remainder) {
            for (let i = 0; i < 9; i++) {
                let trial = (doubledRoot * 10 + i) * i;
                if (trial <= remainder) {
                    console.log(i);
                    return i;
                }
            }
            return 0;
        }

        function isNumberorDot(str) {
            if (str.length == 0) return false;
            let dotCount = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char == ".") {
                    dotCount++;
                    if (dotCount > 1) return false;
                } else if (char < "0" || char > "9") {
                    if (char != "-") return false;
                }
            }
            return true;
        }

        function calcSqRt(numStr) {
            numStr = String(numStr);
            if (!isNumberorDot(numStr)) {
                return "ERROR";
            }

            let isNegative = false;
            if (numStr[0] == "-") {
                isNegative = true;
                numStr = numStr.slice(1);
            }

            let pieces = breakPieces(numStr);
            let hasDecimal = numStr.includes(".");
            let root = Number(findClosestSqrt(pieces[0]));
            let remainder = pieces[0] - (root * root);
            let resultDigits = [root];
            let rootString = "";
            let decIndex = numStr.indexOf(".");

            for (let i = 1; i < pieces.length; i++) {
                remainder = Number(String(remainder) + String(pieces[i]));
                let doubledRoot = root * 2;
                let nextDigit = String(findNextNumber(doubledRoot, remainder));
                let subtracted = ((doubledRoot * 10) + nextDigit) * nextDigit;
                remainder = remainder - (nextDigit * nextDigit);
                if (String(nextDigit).length == 1) {
                    nextDigit = "0" + nextDigit;
                    alert(nextDigit);
                }
                root = String(root) + nextDigit;
                resultDigits.push(nextDigit);
            }

            rootString = resultDigits.join("");

            if (hasDecimal) {
                rootString = rootString.slice(0, decIndex) + "." + rootString.slice(decIndex);
            }

            if (rootString[rootString.length - 1] == ".") {
                rootString = rootString.slice(0, rootString.length - 1);
            }

            if (isNegative) rootString += "i";

            return rootString;
        }
