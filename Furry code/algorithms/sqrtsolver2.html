<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Root Solver</title>
</head>

<body>
    <script>
        function findClosestSqrt(str) {
            for (let i = 0; i <= 10; i++) {
                if (i * i > Number(str)) return String(i - 1);
            }
            return "9";
        }
        function solveSqRt(s,) {
            let num = Number(s);
            let a = Number(findClosestSqrt(num));
            let b = s - (a * a);
            let sqrt = a + (b / (2 * a));
            for (let i = 0; i < 10; i++) {
                a = Number(findClosestSqrt(sqrt));
                b = num - (sqrt * sqrt);
                sqrt = sqrt + (b / (2 * sqrt))
            }
            return "The approximate square root is " + sqrt + " yall monkays🦧🙉🙊🙊🙊🙊🙊🙊🙊🙊"
        }
        console.log(solveSqRt(15));
    </script>
</body>

</html>
