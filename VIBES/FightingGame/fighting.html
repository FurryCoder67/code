<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>NEXUS FIGHT</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #030311;
            font-family: Arial;
            color: white;
        }

        #ui {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .bar {
            width: 300px;
            height: 20px;
            background: #111;
            border: 2px solid cyan;
        }

        .health {
            height: 100%;
            background: cyan;
        }

        #combo {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: cyan;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, .6);
            padding: 10px;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="bar">
            <div id="p1health" class="health"></div>
        </div>
        <div class="bar">
            <div id="p2health" class="health"></div>
        </div>
    </div>

    <div id="combo"></div>

    <div id="controls">
        WASD move | J punch | K kick | L special
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

    <script>

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050520);

        const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, .1, 1000);
        camera.position.set(0, 6, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        scene.add(new THREE.AmbientLight(0x404040));

        function cyberFloor() {

            const g = new THREE.PlaneGeometry(50, 50, 20, 20);
            const m = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            const floor = new THREE.Mesh(g, m);
            floor.rotation.x = -Math.PI / 2;

            return floor;

        }

        scene.add(cyberFloor());

        function createFighter(color) {

            const g = new THREE.Group();

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 2, 0.8),
                new THREE.MeshStandardMaterial({ color })
            );
            body.position.y = 1;
            g.add(body);

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(.45),
                new THREE.MeshStandardMaterial({ color })
            );
            head.position.y = 2.4;
            g.add(head);

            const arm1 = new THREE.Mesh(
                new THREE.BoxGeometry(.3, 1, .3),
                new THREE.MeshStandardMaterial({ color })
            );
            arm1.position.set(.9, 1.5, 0);
            g.add(arm1);

            const arm2 = arm1.clone();
            arm2.position.x = -.9;
            g.add(arm2);

            return g;

        }

        const player = createFighter(0x00ffff);
        player.position.x = -3;
        scene.add(player);

        const enemy = createFighter(0xff3333);
        enemy.position.x = 3;
        scene.add(enemy);

        let p1Health = 100;
        let p2Health = 100;

        const p1bar = document.getElementById("p1health");
        const p2bar = document.getElementById("p2health");
        const comboUI = document.getElementById("combo");

        let combo = 0;
        let comboTimer = 0;

        const keys = {};

        addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        let attackCooldown = 0;

        function hitEnemy(dmg) {

            const dist = player.position.distanceTo(enemy.position);

            if (dist < 2) {

                p2Health -= dmg;

                combo++;
                comboTimer = 120;

                comboUI.innerText = combo + " HIT COMBO";

                p2bar.style.width = p2Health + "%";

            }

        }

        function punch() {

            if (attackCooldown > 0) return;

            hitEnemy(8);
            attackCooldown = 20;

        }

        function kick() {

            if (attackCooldown > 0) return;

            hitEnemy(14);
            attackCooldown = 35;

        }

        function special() {

            if (attackCooldown > 0) return;

            hitEnemy(25);
            attackCooldown = 80;

        }

        function updatePlayer() {

            const speed = .12;

            if (keys["w"]) player.position.z -= speed;
            if (keys["s"]) player.position.z += speed;
            if (keys["a"]) player.position.x -= speed;
            if (keys["d"]) player.position.x += speed;

            if (keys["j"]) punch();
            if (keys["k"]) kick();
            if (keys["l"]) special();

        }

        let aiTimer = 0;

        function updateAI() {

            const dist = enemy.position.distanceTo(player.position);

            if (dist > 1.5) {

                enemy.position.x += (player.position.x - enemy.position.x) * 0.02;
                enemy.position.z += (player.position.z - enemy.position.z) * 0.02;

            }

            aiTimer++;

            if (aiTimer > 40) {

                if (dist < 2) {

                    p1Health -= 10;
                    p1bar.style.width = p1Health + "%";

                }

                aiTimer = 0;

            }

        }

        function updateGamepad() {

            const gp = navigator.getGamepads()[0];

            if (!gp) return;

            player.position.x += gp.axes[0] * .2;
            player.position.z += gp.axes[1] * .2;

            if (gp.buttons[0].pressed) punch();
            if (gp.buttons[1].pressed) kick();
            if (gp.buttons[2].pressed) special();

        }

        function updateCamera() {

            const midX = (player.position.x + enemy.position.x) / 2;
            const midZ = (player.position.z + enemy.position.z) / 2;

            camera.position.x = midX;
            camera.position.z = midZ + 10;

            camera.lookAt(midX, 1, midZ);

        }

        function gameLoop() {

            requestAnimationFrame(gameLoop);

            updatePlayer();
            updateAI();
            updateGamepad();
            updateCamera();

            if (comboTimer > 0) {
                comboTimer--;
            } else {
                combo = 0;
                comboUI.innerText = "";
            }

            if (attackCooldown > 0) attackCooldown--;

            renderer.render(scene, camera);

        }

        gameLoop();

    </script>
</body>

</html>
